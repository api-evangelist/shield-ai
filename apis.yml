aid: shield-ai
name: Shield AI
description: |
  Shield AI builds autonomous defense systems anchored by Hivemind, an
  AI-powered autonomy stack that pilots aircraft and robotic platforms without
  GPS or communications. Hardware products include the V-BAT vertical-takeoff
  ISR aircraft, the Nova quadcopter, and the announced X-BAT AI-piloted VTOL
  fighter. Hivemind itself is delivered as a layered platform: EdgeOS (real-time
  C++ autonomy middleware), Pilot (autonomy behavior catalog), Forge (autonomy
  factory for build, sim, and test), and Commander (C2 and fleet integration).
  In 2025 Shield AI introduced Hivemind Enterprise, a partner-facing SDK for
  building, evaluating, testing, and deploying mission autonomy on customer
  platforms. There is no public, self-service API; access to Hivemind SDKs and
  developer tooling is gated through partnership and is subject to U.S. export
  controls (ITAR/EAR).
